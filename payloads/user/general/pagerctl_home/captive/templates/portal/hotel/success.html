<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin:0; padding:0; height:100%; font-family:"Georgia","Times New Roman",serif; background:#1c1814; color:#f4efe6; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; box-sizing:border-box; background:linear-gradient(180deg,#2a2320 0%,#1c1814 100%); }
  .card { background:#0f0c0a; border:1px solid #3a302a; border-top:3px solid #c9a961; border-radius:2px; padding:40px 36px; width:min(420px,100%); text-align:center; }
  .check { width:72px; height:72px; border-radius:50%; border:2px solid #c9a961; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; }
  .check svg { width:38px; height:38px; }
  h1 { margin:0 0 6px; color:#c9a961; font-weight:300; letter-spacing:2px; text-transform:uppercase; }
  p { color:#a89c88; font-size:14px; font-style:italic; }
</style>
</head>
<body>
<div class="card">
  <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a961" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h1>Success</h1>
  <p>Your connection is ready. Welcome.</p>
</div>
</body>
</html>
