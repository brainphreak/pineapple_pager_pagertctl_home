<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Roboto, system-ui, sans-serif;
    background: linear-gradient(160deg, #1f6feb 0%, #0b3d91 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 16px;
    padding: 36px 32px;
    max-width: 360px;
    width: calc(100% - 48px);
    text-align: center;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  }
  .check {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #2ecc71;
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
  }
  .check svg { width: 38px; height: 38px; }
  h1 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  p {
    margin: 0;
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.5;
  }
  .meta {
    margin-top: 22px;
    font-size: 11px;
    opacity: 0.55;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff"
           stroke-width="3" stroke-linecap="round"
           stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>You're Connected</h1>
    <p>Success. Your device is now online.<br>
       Enjoy the WiFi.</p>
    <div class="meta">Session active</div>
  </div>
</body>
</html>
