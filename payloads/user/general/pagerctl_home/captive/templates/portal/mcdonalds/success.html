<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin:0; padding:0; height:100%; font-family:"Speedee","Helvetica Neue",Helvetica,Arial,sans-serif; background:#ffc72c; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; box-sizing:border-box; }
  .card { background:#fff; border-radius:12px; padding:36px 32px; width:min(420px,100%); text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.12); }
  .check { width:72px; height:72px; border-radius:50%; background:#da291c; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; }
  .check svg { width:38px; height:38px; }
  h1 { margin:0 0 6px; color:#292929; }
  p { color:#6b6b6b; font-size:14px; }
</style>
</head>
<body>
<div class="card">
  <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h1>Success</h1>
  <p>You're connected. Enjoy your visit.</p>
</div>
</body>
</html>
